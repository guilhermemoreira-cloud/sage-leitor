<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>SAGE - Leitor QR Code</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            background: #000;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #1a1a1a, #2d2d2d);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #00ff00;
        }

        .title {
            font-size: 24px;
            font-weight: bold;
            color: #00ff00;
        }

        .counter {
            background: #00ff00;
            color: #000;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 18px;
        }

        /* Container da câmera */
        #video-container {
            position: relative;
            width: 100%;
            aspect-ratio: 4/3;
            background: #1a1a1a;
            overflow: hidden;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Scanner overlay */
        .scanner-area {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 250px;
            height: 250px;
            border: 3px solid #00ff00;
            border-radius: 20px;
            box-shadow: 0 0 0 1000px rgba(0, 0, 0, 0.5);
        }

        .scanner-line {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 250px;
            height: 3px;
            background: #00ff00;
            box-shadow: 0 0 20px #00ff00;
            animation: scan 2s linear infinite;
        }

        @keyframes scan {
            0% { transform: translate(-50%, -100px); }
            50% { transform: translate(-50%, 100px); }
            100% { transform: translate(-50%, -100px); }
        }

        /* Botões */
        .controls {
            display: flex;
            gap: 15px;
            padding: 20px;
            background: #1a1a1a;
        }

        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #00ff00;
            color: #000;
        }

        .btn-secondary {
            background: #333;
            color: white;
        }

        .btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.2);
        }

        /* Lista de últimos registros */
        .history {
            flex: 1;
            padding: 20px;
            background: #1a1a1a;
            border-top: 1px solid #333;
        }

        .history h3 {
            color: #00ff00;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .history-item {
            background: #2d2d2d;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 8px;
            border-left: 4px solid #00ff00;
        }

        .history-item .name {
            font-weight: bold;
            font-size: 16px;
        }

        .history-item .time {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 15px 25px;
            border-radius: 30px;
            text-align: center;
            animation: slideUp 0.3s ease;
            z-index: 1000;
            backdrop-filter: blur(10px);
            border-left: 5px solid;
        }

        .toast.success { border-color: #00ff00; }
        .toast.warning { border-color: #ffaa00; }
        .toast.error { border-color: #ff4444; }

        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Loading */
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #00ff00;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">📱 SAGE QR</div>
        <div class="counter" id="counter">0</div>
    </div>

    <div id="video-container">
        <video id="video" playsinline></video>
        <div class="scanner-area"></div>
        <div class="scanner-line"></div>
        <div class="loading" id="loading">Ativando câmera...</div>
    </div>

    <div class="controls">
        <button class="btn btn-primary" onclick="trocarCamera()" id="cameraBtn">🔄 Trocar câmera</button>
        <button class="btn btn-secondary" onclick="fechar()">✕ Fechar</button>
    </div>

    <div class="history">
        <h3>📋 Últimos registros</h3>
        <div id="history-list"></div>
    </div>

    <div id="toast"></div>

    <script src="https://unpkg.com/@zxing/library@latest/umd/index.min.js"></script>
    
    <script>
        // ===================================================
        // CONFIGURAÇÕES
        // ===================================================
        const CONFIG = {
            URL_SERVIDOR: 'https://script.google.com/macros/s/AKfycbzUIUdRCRNh5XRzHX_KhbNKtToERDogp9de4ICLsbUsIs1r9-EBoTq94WliopK6ztLQ/exec',
            SOM: true,
            VIBRACAO: true
        };

        // ===================================================
        // VARIÁVEIS GLOBAIS
        // ===================================================
        let codeReader = null;
        let activeCamera = 'environment'; // 'environment' = traseira, 'user' = frontal
        let scanning = true;
        let registrosHoje = 0;
        let ultimosRegistros = [];
        let audioContext = null;

        // ===================================================
        // INICIALIZAÇÃO
        // ===================================================
        window.onload = function() {
            mostrarLoading('Preparando...');
            criarAudioContext();
            iniciarLeitor();
        };

        function criarAudioContext() {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            } catch (e) {
                console.log('Áudio não suportado');
            }
        }

        function tocarBeep() {
            if (!CONFIG.SOM || !audioContext) return;
            
            try {
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.frequency.value = 800;
                gainNode.gain.value = 0.3;
                
                oscillator.start();
                oscillator.stop(audioContext.currentTime + 0.1);
            } catch (e) {}
        }

        function vibrar() {
            if (CONFIG.VIBRACAO && navigator.vibrate) {
                navigator.vibrate(100);
            }
        }

        // ===================================================
        // LEITOR QR CODE
        // ===================================================
        function iniciarLeitor() {
            codeReader = new ZXing.BrowserMultiFormatReader();
            
            const videoElement = document.getElementById('video');
            
            const constraints = {
                video: {
                    facingMode: activeCamera,
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                }
            };

            mostrarLoading('Solicitando câmera...');

            codeReader.decodeFromConstraints(constraints, videoElement, (result, error) => {
                if (result) {
                    processarQRCode(result.text);
                }
            });

            // Esconder loading após 2 segundos
            setTimeout(() => {
                document.getElementById('loading').classList.add('hidden');
            }, 2000);
        }

        function trocarCamera() {
            activeCamera = activeCamera === 'environment' ? 'user' : 'environment';
            
            if (codeReader) {
                codeReader.reset();
            }
            
            document.getElementById('loading').classList.remove('hidden');
            mostrarLoading('Trocando câmera...');
            
            iniciarLeitor();
        }

        // ===================================================
        // PROCESSAR QR CODE
        // ===================================================
        function processarQRCode(text) {
            if (!scanning) return;
            
            scanning = false;
            mostrarLoading('Processando...');

            try {
                // Parse dos dados
                let dados;
                try {
                    dados = JSON.parse(text);
                } catch (e) {
                    const partes = text.split(',');
                    if (partes.length >= 2) {
                        dados = {
                            nome: partes[0].trim(),
                            sige: partes[1].trim(),
                            turma: partes[2]?.trim() || ''
                        };
                    } else {
                        throw new Error('Formato inválido');
                    }
                }

                if (!dados.sige || !dados.nome) {
                    throw new Error('Dados incompletos');
                }

                console.log('QR Code lido:', dados);

                // Enviar para o servidor
                fetch(CONFIG.URL_SERVIDOR, {
                    method: 'POST',
                    mode: 'no-cors', // Importante para evitar CORS
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        action: 'registrar',
                        dados: dados,
                        timestamp: new Date().toISOString()
                    })
                });

                // Como usamos 'no-cors', não temos resposta
                // Mas assumimos sucesso e registramos localmente
                
                registrosHoje++;
                document.getElementById('counter').textContent = registrosHoje;
                
                adicionarRegistroLista(dados.nome, dados.turma);
                
                tocarBeep();
                vibrar();
                
                mostrarToast(`✅ ${dados.nome}`, 'success');
                
                setTimeout(() => {
                    scanning = true;
                    document.getElementById('loading').classList.add('hidden');
                }, 500);

            } catch (erro) {
                console.error('Erro:', erro);
                mostrarToast('❌ QR Code inválido', 'error');
                setTimeout(() => {
                    scanning = true;
                    document.getElementById('loading').classList.add('hidden');
                }, 500);
            }
        }

        // ===================================================
        // FUNÇÕES AUXILIARES
        // ===================================================
        function mostrarLoading(msg) {
            const loading = document.getElementById('loading');
            loading.textContent = msg || 'Processando...';
            loading.classList.remove('hidden');
        }

        function mostrarToast(msg, tipo) {
            const toast = document.getElementById('toast');
            toast.className = `toast ${tipo}`;
            toast.textContent = msg;
            
            setTimeout(() => {
                toast.className = 'toast';
                toast.textContent = '';
            }, 2000);
        }

        function adicionarRegistroLista(nome, turma) {
            ultimosRegistros.unshift({
                nome: nome,
                turma: turma,
                hora: new Date().toLocaleTimeString()
            });
            
            if (ultimosRegistros.length > 5) {
                ultimosRegistros.pop();
            }
            
            const lista = document.getElementById('history-list');
            lista.innerHTML = ultimosRegistros.map(r => `
                <div class="history-item">
                    <div class="name">${r.nome}</div>
                    <div class="time">${r.turma} • ${r.hora}</div>
                </div>
            `).join('');
        }

        function fechar() {
            if (codeReader) {
                codeReader.reset();
            }
            window.close();
        }

        // ===================================================
        // LIMPEZA
        // ===================================================
        window.onbeforeunload = function() {
            if (codeReader) {
                codeReader.reset();
            }
        };
    </script>
</body>
</html>
