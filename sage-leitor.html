<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>SAGE - Leitor QR Code</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            background: #000;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: linear-gradient(135deg, #1a1a1a, #2d2d2d);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #00ff00;
        }

        .title {
            font-size: 24px;
            font-weight: bold;
            color: #00ff00;
        }

        .counter {
            background: #00ff00;
            color: #000;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 18px;
        }

        #video-container {
            position: relative;
            width: 100%;
            aspect-ratio: 4/3;
            background: #1a1a1a;
            overflow: hidden;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .scanner-area {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 250px;
            height: 250px;
            border: 3px solid #00ff00;
            border-radius: 20px;
            box-shadow: 0 0 0 1000px rgba(0, 0, 0, 0.5);
        }

        .scanner-line {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 250px;
            height: 3px;
            background: #00ff00;
            box-shadow: 0 0 20px #00ff00;
            animation: scan 2s linear infinite;
        }

        @keyframes scan {
            0% { transform: translate(-50%, -100px); }
            50% { transform: translate(-50%, 100px); }
            100% { transform: translate(-50%, -100px); }
        }

        .controls {
            display: flex;
            gap: 15px;
            padding: 20px;
            background: #1a1a1a;
        }

        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #00ff00;
            color: #000;
        }

        .btn-secondary {
            background: #333;
            color: white;
        }

        .btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.2);
        }

        .history {
            flex: 1;
            padding: 20px;
            background: #1a1a1a;
            border-top: 1px solid #333;
        }

        .history h3 {
            color: #00ff00;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .history-item {
            background: #2d2d2d;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 8px;
            border-left: 4px solid #00ff00;
        }

        .history-item .name {
            font-weight: bold;
            font-size: 16px;
        }

        .history-item .time {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 15px 25px;
            border-radius: 30px;
            text-align: center;
            animation: slideUp 0.3s ease;
            z-index: 1000;
            backdrop-filter: blur(10px);
            border-left: 5px solid;
        }

        .toast.success { border-color: #00ff00; }
        .toast.warning { border-color: #ffaa00; }
        .toast.error { border-color: #ff4444; }

        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #00ff00;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 30px;
            z-index: 10;
        }

        .hidden {
            display: none;
        }

        .config-panel {
            background: #2d2d2d;
            padding: 15px;
            margin: 10px;
            border-radius: 15px;
        }

        .config-panel input {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border-radius: 8px;
            border: 1px solid #444;
            background: #333;
            color: white;
        }

        .config-panel button {
            background: #00ff00;
            color: #000;
            border: none;
            padding: 10px;
            border-radius: 8px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">📱 SAGE QR</div>
        <div class="counter" id="counter">0</div>
    </div>

    <!-- Painel de configuração (aparece apenas se não configurado) -->
    <div id="config-panel" class="config-panel">
        <h3>⚙️ Configurar Planilha</h3>
        <p style="font-size: 12px; margin-bottom: 10px;">Cole o ID da sua planilha:</p>
        <input type="text" id="sheet-id" placeholder="Ex: 1a2b3c4d5e6f7g8h9i0j">
        <p style="font-size: 12px; margin: 10px 0;">Cole o nome da aba:</p>
        <input type="text" id="sheet-name" value="DADOS BRUTOS">
        <button onclick="salvarConfig()">✅ SALVAR CONFIGURAÇÃO</button>
        <p style="font-size: 11px; color: #999; margin-top: 10px;">
            O ID está na URL: https://docs.google.com/spreadsheets/d/<b>ID_AQUI</b>/edit
        </p>
    </div>

    <div id="scanner-container" class="hidden">
        <div id="video-container">
            <video id="video" playsinline></video>
            <div class="scanner-area"></div>
            <div class="scanner-line"></div>
            <div class="loading" id="loading">Ativando câmera...</div>
        </div>

        <div class="controls">
            <button class="btn btn-primary" onclick="trocarCamera()" id="cameraBtn">🔄 Trocar câmera</button>
            <button class="btn btn-secondary" onclick="reconfigurar()">⚙️ Configurar</button>
        </div>

        <div class="history">
            <h3>📋 Últimos registros</h3>
            <div id="history-list"></div>
        </div>
    </div>

    <div id="toast"></div>

    <script src="https://unpkg.com/@zxing/library@latest/umd/index.min.js"></script>
    <script src="https://apis.google.com/js/api.js"></script>
    
    <script>
        // ===================================================
        // CONFIGURAÇÕES
        // ===================================================
        let SHEET_ID = localStorage.getItem('sage_sheet_id');
        let SHEET_NAME = localStorage.getItem('sage_sheet_name') || 'DADOS BRUTOS';
        
        let codeReader = null;
        let activeCamera = 'environment';
        let scanning = true;
        let registrosHoje = 0;
        let ultimosRegistros = [];
        let audioContext = null;
        let accessToken = null;

        // ===================================================
        // INICIALIZAÇÃO
        // ===================================================
        window.onload = function() {
            criarAudioContext();
            
            if (SHEET_ID) {
                document.getElementById('config-panel').classList.add('hidden');
                document.getElementById('scanner-container').classList.remove('hidden');
                autenticarGoogle();
            } else {
                document.getElementById('config-panel').classList.remove('hidden');
                document.getElementById('scanner-container').classList.add('hidden');
            }
        };

        function criarAudioContext() {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            } catch (e) {}
        }

        function tocarBeep() {
            if (!audioContext) return;
            try {
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                oscillator.frequency.value = 800;
                gainNode.gain.value = 0.3;
                oscillator.start();
                oscillator.stop(audioContext.currentTime + 0.1);
            } catch (e) {}
        }

        function vibrar() {
            if (navigator.vibrate) {
                navigator.vibrate(100);
            }
        }

        // ===================================================
        // AUTENTICAÇÃO GOOGLE
        // ===================================================
        function autenticarGoogle() {
            mostrarToast('🔄 Autenticando...', 'info');
            
            gapi.load('client:auth2', function() {
                gapi.client.init({
                    apiKey: 'AIzaSyD-9tSrke72P6ZJOHzYpPJvJRrF7l6F5dI',
                    clientId: '407408718192.apps.googleusercontent.com',
                    scope: 'https://www.googleapis.com/auth/spreadsheets',
                    discoveryDocs: ['https://sheets.googleapis.com/$discovery/rest?version=v4']
                }).then(function() {
                    return gapi.auth2.getAuthInstance().signIn({
                        prompt: 'select_account'
                    });
                }).then(function() {
                    mostrarToast('✅ Autenticado!', 'success');
                    iniciarLeitor();
                }).catch(function(err) {
                    console.error('Erro auth:', err);
                    mostrarToast('❌ Erro ao autenticar', 'error');
                });
            });
        }

        // ===================================================
        // CONFIGURAÇÃO
        // ===================================================
        function salvarConfig() {
            const sheetId = document.getElementById('sheet-id').value.trim();
            const sheetName = document.getElementById('sheet-name').value.trim();
            
            if (!sheetId) {
                mostrarToast('❌ Digite o ID da planilha', 'error');
                return;
            }
            
            localStorage.setItem('sage_sheet_id', sheetId);
            localStorage.setItem('sage_sheet_name', sheetName);
            
            SHEET_ID = sheetId;
            SHEET_NAME = sheetName;
            
            document.getElementById('config-panel').classList.add('hidden');
            document.getElementById('scanner-container').classList.remove('hidden');
            
            autenticarGoogle();
        }

        function reconfigurar() {
            if (codeReader) {
                codeReader.reset();
            }
            document.getElementById('config-panel').classList.remove('hidden');
            document.getElementById('scanner-container').classList.add('hidden');
        }

        // ===================================================
        // LEITOR QR CODE
        // ===================================================
        function iniciarLeitor() {
            codeReader = new ZXing.BrowserMultiFormatReader();
            
            const videoElement = document.getElementById('video');
            
            const constraints = {
                video: {
                    facingMode: activeCamera,
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                }
            };

            mostrarLoading('Solicitando câmera...');

            codeReader.decodeFromConstraints(constraints, videoElement, (result, error) => {
                if (result) {
                    processarQRCode(result.text);
                }
            });

            setTimeout(() => {
                document.getElementById('loading').classList.add('hidden');
            }, 2000);
        }

        function trocarCamera() {
            activeCamera = activeCamera === 'environment' ? 'user' : 'environment';
            
            if (codeReader) {
                codeReader.reset();
            }
            
            document.getElementById('loading').classList.remove('hidden');
            mostrarLoading('Trocando câmera...');
            
            iniciarLeitor();
        }

        // ===================================================
        // PROCESSAR QR CODE
        // ===================================================
        function processarQRCode(text) {
            if (!scanning) return;
            
            scanning = false;
            mostrarLoading('Processando...');

            try {
                let dados;
                try {
                    dados = JSON.parse(text);
                } catch (e) {
                    const partes = text.split(',');
                    if (partes.length >= 2) {
                        dados = {
                            nome: partes[0].trim(),
                            sige: partes[1].trim(),
                            turma: partes[2]?.trim() || ''
                        };
                    } else {
                        throw new Error('Formato inválido');
                    }
                }

                if (!dados.sige || !dados.nome) {
                    throw new Error('Dados incompletos');
                }

                console.log('QR Code lido:', dados);

                // Registrar na planilha
                registrarNaPlanilha(dados);

            } catch (erro) {
                mostrarToast('❌ QR Code inválido', 'error');
                setTimeout(() => {
                    scanning = true;
                    document.getElementById('loading').classList.add('hidden');
                }, 500);
            }
        }

        // ===================================================
        // REGISTRAR NA PLANILHA (Google Sheets API)
        // ===================================================
        function registrarNaPlanilha(dados) {
            const agora = new Date();
            const timestamp = agora.toISOString().replace('T', ' ').substring(0, 19);
            
            const valores = [[
                timestamp,
                `${dados.nome},${dados.sige}`
            ]];

            gapi.client.sheets.spreadsheets.values.append({
                spreadsheetId: SHEET_ID,
                range: `${SHEET_NAME}!A:B`,
                valueInputOption: 'USER_ENTERED',
                insertDataOption: 'INSERT_ROWS',
                resource: { values: valores }
            }).then(function(response) {
                console.log('Registrado com sucesso:', response);
                
                registrosHoje++;
                document.getElementById('counter').textContent = registrosHoje;
                
                adicionarRegistroLista(dados.nome, dados.turma);
                
                tocarBeep();
                vibrar();
                
                mostrarToast(`✅ ${dados.nome}`, 'success');
                
                setTimeout(() => {
                    scanning = true;
                    document.getElementById('loading').classList.add('hidden');
                }, 300);
                
            }, function(error) {
                console.error('Erro ao registrar:', error);
                mostrarToast('❌ Erro na planilha', 'error');
                
                setTimeout(() => {
                    scanning = true;
                    document.getElementById('loading').classList.add('hidden');
                }, 300);
            });
        }

        // ===================================================
        // FUNÇÕES AUXILIARES
        // ===================================================
        function mostrarLoading(msg) {
            const loading = document.getElementById('loading');
            loading.textContent = msg || 'Processando...';
            loading.classList.remove('hidden');
        }

        function mostrarToast(msg, tipo) {
            const toast = document.getElementById('toast');
            toast.className = `toast ${tipo}`;
            toast.textContent = msg;
            
            setTimeout(() => {
                toast.className = 'toast';
                toast.textContent = '';
            }, 2000);
        }

        function adicionarRegistroLista(nome, turma) {
            ultimosRegistros.unshift({
                nome: nome,
                turma: turma,
                hora: new Date().toLocaleTimeString()
            });
            
            if (ultimosRegistros.length > 5) {
                ultimosRegistros.pop();
            }
            
            const lista = document.getElementById('history-list');
            lista.innerHTML = ultimosRegistros.map(r => `
                <div class="history-item">
                    <div class="name">${r.nome}</div>
                    <div class="time">${r.turma} • ${r.hora}</div>
                </div>
            `).join('');
        }

        // ===================================================
        // LIMPEZA
        // ===================================================
        window.onbeforeunload = function() {
            if (codeReader) {
                codeReader.reset();
            }
        };
    </script>
</body>
</html>
